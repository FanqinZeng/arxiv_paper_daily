name: Daily arXiv Papers

on:
  schedule:
    # Beijing time 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-arxiv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv daily
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          SMTP_RECEIVER: ${{ secrets.SMTP_RECEIVER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python main.py \
            --categories cs.AI cs.RO cs.LG cs.CV cs.CL cs.MA cs.SY cs.HC \
            --max_paper_num 20 \
            --provider OpenAI \
            --model "${GLM_MODEL:-glm-4.5-air}" \
            --base_url "https://open.bigmodel.cn/api/coding/paas/v4" \
            --api_key "$GLM_API_KEY" \
            --smtp_server "$SMTP_SERVER" \
            --smtp_port "${SMTP_PORT:-465}" \
            --sender "$SMTP_SENDER" \
            --receiver "$SMTP_RECEIVER" \
            --sender_password "$SMTP_PASSWORD" \
            --temperature 0.3 \
            --num_workers 4 \
            --title "Daily arXiv Papers" \
            --save

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arxiv_pushed_ids.json arxiv_history/ || true
          git diff --cached --quiet || git commit -m "Update arXiv history $(date +%Y-%m-%d)"
          git push
